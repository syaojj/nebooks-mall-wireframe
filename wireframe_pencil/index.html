<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NE Books · Pencil 와이어프레임 v1.0</title>
<!--
  =====================================================================
  NE Books 자사몰 개편 — Pencil 와이어프레임 v1.0 (뷰어)
  - 출처: Pencil(.pen) `pencil/v1.0.pen`에서 디자인 후 export_nodes로 내보낸 화면(webp)
  - 본 페이지는 Pencil에서 만든 화면을 그대로 보여주는 정적 뷰어입니다.
    (이미지 기반이라 폼/장바구니 같은 실제 인터랙션은 동작하지 않습니다 — 화면 전환만 제공)
  - 기준 기능정의서: NE Books 개편_기능 정의서_v2.0_260618
  =====================================================================
-->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Pretendard Variable","맑은 고딕",system-ui,sans-serif; background: #dcdcdc; color: #222; }
  .top { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 12px; padding: 10px 18px; background: #222; color: #fff; border-bottom: 3px solid #000; }
  .top h1 { font-size: 15px; font-weight: 700; }
  .top .tag { font-size: 11px; background: #555; padding: 2px 8px; border-radius: 2px; }
  .top a.home { margin-left: auto; color: #ddd; font-size: 12px; text-decoration: none; border: 1px solid #555; padding: 4px 10px; border-radius: 3px; }
  .top a.home:hover { background: #333; }

  .body { display: flex; align-items: flex-start; min-height: calc(100vh - 47px); }
  .side { width: 230px; flex: 0 0 230px; position: sticky; top: 47px; height: calc(100vh - 47px); overflow-y: auto; background: #f7f7f7; border-right: 1px solid #999; padding: 12px 0; }
  .side .grp { padding: 8px 16px 4px; font-size: 11px; font-weight: 700; color: #888; letter-spacing: .4px; margin-top: 6px; }
  .side button { display: block; width: 100%; text-align: left; padding: 8px 16px; border: none; border-left: 3px solid transparent; background: none; color: #555; font-size: 12.5px; cursor: pointer; font-family: inherit; }
  .side button:hover { background: #ededed; }
  .side button.active { background: #e3e3e3; border-left-color: #222; color: #000; font-weight: 700; }
  .side .sid { display: block; font-size: 10px; color: #999; }

  .stage { flex: 1; min-width: 0; padding: 20px 24px 60px; }
  .stage .info { background: #fff7e6; border: 1px dashed #d9a441; color: #8a5d00; font-size: 12px; padding: 8px 12px; border-radius: 4px; margin-bottom: 14px; }
  .screen-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
  .screen-meta { font-size: 12px; color: #666; margin-bottom: 12px; }
  .frame { background: #fff; border: 1px solid #999; padding: 8px; display: inline-block; max-width: 100%; }
  .frame img { display: block; width: 1024px; max-width: 100%; height: auto; }
  .note { margin-top: 16px; font-size: 11.5px; color: #777; }
</style>
</head>
<body>
  <div class="top">
    <h1>NE Books · Pencil 와이어프레임 v1.0</h1>
    <span class="tag">Pencil(.pen) 디자인 export</span>
    <a class="home" href="../index.html">← 버전 선택으로</a>
  </div>

  <div class="body">
    <nav class="side" id="side">
      <div class="grp">A안 (메인 세트)</div>
      <button data-img="a1-main"   data-title="1. 메인 화면"   class="active"><span class="sid">MAIN</span>1. 메인 화면</button>
      <button data-img="a2-list"   data-title="2. 교재목록 화면"><span class="sid">BOOK-LIST</span>2. 교재목록 화면</button>
      <button data-img="a3-detail" data-title="3. 교재상세 화면"><span class="sid">BOOK-VIEW</span>3. 교재상세 화면</button>
      <button data-img="a4-cart"   data-title="4. 장바구니 화면"><span class="sid">CART</span>4. 장바구니 화면</button>
      <button data-img="a5-order"  data-title="5. 주문 / 결제"><span class="sid">ORDER</span>5. 주문 / 결제</button>
      <button data-img="a6-mypage" data-title="6. 마이페이지"><span class="sid">MY</span>6. 마이페이지</button>
      <button data-img="a7-wish"   data-title="7. 찜 (책갈피)"><span class="sid">MY-WISH</span>7. 찜 (책갈피)</button>

      <div class="grp">B안 (대안 탐색)</div>
      <button data-img="b1-main"   data-title="1. 메인 화면 (B안)"><span class="sid">MAIN</span>1. 메인 화면 (B안)</button>
      <button data-img="b2-list"   data-title="2. 교재목록 화면 (B안)"><span class="sid">BOOK-LIST</span>2. 교재목록 (B안)</button>
      <button data-img="b3-detail" data-title="3. 교재상세 화면 (B안)"><span class="sid">BOOK-VIEW</span>3. 교재상세 (B안)</button>
      <button data-img="b4-ebook"  data-title="2-2. E-Book / 자료"><span class="sid">DATA</span>2-2. E-Book / 자료</button>
      <button data-img="b5-data"   data-title="8. 학습자료실"><span class="sid">DATA</span>8. 학습자료실</button>
    </nav>

    <main class="stage">
      <div class="info">Pencil(.pen)에서 디자인한 화면을 이미지로 내보낸 뷰어입니다. 화면 전환은 좌측 메뉴로 가능하며, 폼·장바구니 등 실제 기능 동작은 포함하지 않습니다(디자인 검토용).</div>
      <div class="screen-title" id="title">1. 메인 화면</div>
      <div class="screen-meta">NE Books 개편 Front 와이어프레임 · Pencil v1.0</div>
      <div class="frame"><img id="shot" src="img/a1-main.webp" alt="Pencil 와이어프레임 화면"></div>
      <div class="note">※ 원본은 Pencil(.pen) 파일이며, 본 페이지는 해당 디자인을 캡처한 정적 이미지입니다.</div>
    </main>
  </div>

  <script>
    (function () {
      var side = document.getElementById('side');
      var shot = document.getElementById('shot');
      var title = document.getElementById('title');
      side.addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-img]');
        if (!btn) return;
        Array.prototype.forEach.call(side.querySelectorAll('button'), function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        shot.src = 'img/' + btn.getAttribute('data-img') + '.webp';
        title.textContent = btn.getAttribute('data-title');
        window.scrollTo(0, 0);
      });
    })();
  </script>
</body>
</html>
